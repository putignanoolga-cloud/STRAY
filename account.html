<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stray — Il mio account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FBF7F0;--surface:#FFFFFF;--surface-2:#F4EEE4;
  --ink:#1E2A28;--ink-soft:#5E6E6A;--ink-faint:#94A09C;
  --line:rgba(30,42,40,0.10);
  --green:#1C9B73;--green-dark:#147257;--green-soft:#E4F3EC;
  --coral:#F2674A;--coral-soft:#FDE7E0;
  --radius:20px;
  --shadow-sm:0 4px 14px rgba(24,48,40,0.06);
  --shadow:0 14px 38px rgba(24,48,40,0.10);
  --shadow-lg:0 28px 64px rgba(24,48,40,0.16);
}
html,body{background:var(--bg);font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--ink);min-height:100%;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(28,155,115,0.18);}

.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:rgba(251,247,240,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.icon-btn{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .18s;flex-shrink:0;text-decoration:none;}
.icon-btn:hover{border-color:var(--green);color:var(--green);}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);}
.brand-mark{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-family:"Fraunces",serif;font-size:1.18rem;font-weight:600;}
.brand-name b{color:var(--green);}

.wrap{max-width:600px;margin:0 auto;}

/* profile hero */
.profile-hero{padding:26px 20px 0;}
.profile-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow-sm);}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.profile-avatar{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,var(--green-soft),#CFEBDD);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.profile-name{font-family:"Fraunces",serif;font-size:1.5rem;font-weight:600;line-height:1.1;}
.profile-email{font-size:.82rem;color:var(--ink-soft);margin-top:3px;}
.profile-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.pbadge{font-size:.7rem;font-weight:700;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
.pbadge-tipo{background:var(--green-soft);color:var(--green-dark);}
.pbadge-paese{background:var(--surface-2);color:var(--ink-soft);}
.stats-row{display:flex;gap:10px;}
.stat{flex:1;text-align:center;padding:14px 8px;background:var(--surface-2);border-radius:15px;}
.stat-num{font-family:"Fraunces",serif;font-size:1.7rem;font-weight:600;color:var(--green);line-height:1;}
.stat-label{font-size:.68rem;color:var(--ink-soft);margin-top:5px;font-weight:600;}

/* section */
.section{padding:26px 20px;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:"Fraunces",serif;font-size:1.35rem;font-weight:600;}
.toggle{display:flex;background:var(--surface-2);border-radius:12px;padding:3px;}
.toggle button{border:none;background:none;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--ink-soft);padding:7px 13px;border-radius:9px;cursor:pointer;transition:all .18s;}
.toggle button.on{background:var(--surface);color:var(--green-dark);box-shadow:var(--shadow-sm);}

/* country filter */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:6px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:8px 15px;border-radius:30px;border:1.5px solid var(--line);font-size:.84rem;font-weight:500;color:var(--ink-soft);cursor:pointer;white-space:nowrap;background:var(--surface);transition:all .15s;flex-shrink:0;display:inline-flex;align-items:center;gap:6px;}
.filter-chip:hover{border-color:var(--ink-faint);}
.filter-chip.sel{border-color:var(--green);background:var(--green-soft);color:var(--green-dark);}

/* report cards */
.r-card{display:flex;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:11px;cursor:pointer;text-decoration:none;color:inherit;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s,border-color .18s;}
.r-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(28,155,115,.3);}
.r-thumb{width:70px;height:70px;border-radius:13px;background:var(--surface-2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.9rem;}
.r-thumb img{width:100%;height:100%;object-fit:cover;}
.r-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.r-country{font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--green);margin-bottom:3px;}
.r-loc{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-desc{font-size:.8rem;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.r-meta{display:flex;align-items:center;gap:8px;margin-top:7px;}
.r-time{font-size:.72rem;color:var(--ink-faint);}
.r-comments{font-size:.74rem;color:var(--ink-soft);display:inline-flex;align-items:center;gap:4px;}
.tag{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:8px;}
.tag-aperta{background:var(--coral-soft);color:#C8442A;}
.tag-presa{background:#FDF1D6;color:#B57A12;}
.tag-risolta{background:var(--green-soft);color:var(--green-dark);}

.empty{text-align:center;padding:46px 20px;color:var(--ink-soft);}
.empty-icon{font-size:2.6rem;margin-bottom:12px;}
.empty p{font-size:.9rem;line-height:1.6;}
.empty a{color:var(--green);font-weight:700;text-decoration:none;}

/* logout */
.logout-row{padding:0 20px 40px;text-align:center;}
.logout-btn{background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;padding:12px 24px;border-radius:30px;transition:all .2s;}
.logout-btn:hover{border-color:var(--coral);color:var(--coral);}

/* not logged in */
.nologin{padding:40px 24px;text-align:center;max-width:440px;margin:0 auto;}
.nologin-art{width:96px;height:96px;border-radius:30px;background:linear-gradient(135deg,var(--green-soft),#CFEBDD);display:flex;align-items:center;justify-content:center;font-size:3rem;margin:10px auto 22px;}
.nologin h2{font-family:"Fraunces",serif;font-size:1.9rem;font-weight:600;margin-bottom:10px;}
.nologin p{font-size:.92rem;color:var(--ink-soft);margin-bottom:26px;line-height:1.6;}
.btn-amber{display:inline-block;width:100%;padding:15px;background:var(--green);color:#fff;border-radius:14px;font-size:.98rem;font-weight:700;text-decoration:none;transition:background .2s;margin-bottom:11px;}
.btn-amber:hover{background:var(--green-dark);}
.btn-ghost{display:inline-block;width:100%;padding:14px;background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:14px;font-size:.92rem;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink);}

/* demo login */
.demo{display:none;margin-top:18px;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow-sm);animation:fade .3s ease;}
.demo.show{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.demo .dlabel{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:7px;display:block;}
.demo input,.demo select{width:100%;padding:12px 14px;background:var(--surface-2);border:1.5px solid transparent;border-radius:12px;color:var(--ink);font-size:1rem;font-family:inherit;outline:none;margin-bottom:13px;-webkit-appearance:none;}
.demo input:focus,.demo select:focus{border-color:var(--green);background:var(--surface);}
.demo-note{font-size:.74rem;color:var(--ink-faint);margin-top:4px;text-align:center;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;padding:13px 24px;border-radius:30px;font-size:.88rem;font-weight:600;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s !important;}}
</style>
</head>
<body>

<div class="topbar">
  <a class="icon-btn" href="index.html" aria-label="Home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <a class="brand" href="index.html"><span class="brand-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 21s-7-4.6-9.3-9.2C1.2 8.9 2.6 5.5 6 5.5c2 0 3.2 1.2 4 2.4.8-1.2 2-2.4 4-2.4 3.4 0 4.8 3.4 3.3 6.3C19 16.4 12 21 12 21z"/></svg></span><span class="brand-name">Str<b>a</b>y</span></a>
  <div style="width:40px"></div>
</div>

<div id="main"></div>
<div class="toast" id="toast"></div>

<script>
var COUNTRIES=[
  {code:'IT',name:'Italia',flag:'🇮🇹'},{code:'FR',name:'Francia',flag:'🇫🇷'},
  {code:'DE',name:'Germania',flag:'🇩🇪'},{code:'ES',name:'Spagna',flag:'🇪🇸'},
  {code:'PT',name:'Portogallo',flag:'🇵🇹'},{code:'NL',name:'Paesi Bassi',flag:'🇳🇱'},
  {code:'BE',name:'Belgio',flag:'🇧🇪'},{code:'PL',name:'Polonia',flag:'🇵🇱'},
  {code:'GR',name:'Grecia',flag:'🇬🇷'},{code:'HR',name:'Croazia',flag:'🇭🇷'},
  {code:'AT',name:'Austria',flag:'🇦🇹'},{code:'CH',name:'Svizzera',flag:'🇨🇭'}
];
var AVATARS={cat:'🐱',dog:'🐶',bird:'🐦',fox:'🦊',sun:'🌻'};
function CMETA(code){for(var i=0;i<COUNTRIES.length;i++)if(COUNTRIES[i].code===code)return COUNTRIES[i];return {code:code,name:code,flag:'🌍'};}

var user=null;try{user=JSON.parse(localStorage.getItem('stray_user')||'null');}catch(e){}
var reports=JSON.parse(localStorage.getItem('stray_r')||'[]');
var activePaese=null;
var onlyMine=false;

function render(){
  var main=document.getElementById('main');

  if(!user){
    main.innerHTML=
      '<div class="nologin">'+
        '<div class="nologin-art">👤</div>'+
        '<h2>Accedi al tuo account</h2>'+
        '<p>Registrati per vedere le segnalazioni complete, intervenire e coordinarti con altri volontari in tutta Europa.</p>'+
        '<a class="btn-amber" href="registrati.html">Registrati</a>'+
        '<button class="btn-ghost" onclick="toggleDemo()">Accedi</button>'+
        '<div class="demo" id="demo">'+
          '<label class="dlabel">Nome</label><input type="text" id="dl-nome" placeholder="Il tuo nome">'+
          '<label class="dlabel">Paese</label><select id="dl-paese">'+COUNTRIES.map(function(c){return '<option value="'+c.code+'">'+c.flag+' '+c.name+'</option>';}).join('')+'</select>'+
          '<a class="btn-amber" style="cursor:pointer" onclick="demoLogin()">Entra</a>'+
          '<div class="demo-note">Accesso dimostrativo · i dati restano sul tuo dispositivo</div>'+
        '</div>'+
      '</div>';
    return;
  }

  if(activePaese===null&&user.paese){activePaese=user.paese.code||user.paese;}

  var avatarEmoji=AVATARS[user.avatar]||'👤';
  var tipoLabel=user.tipo==='associazione'?'🏠 Associazione':'🙋 Volontario';
  var pmeta=user.paese?CMETA(user.paese.code||user.paese):null;
  var paeseLabel=pmeta?(pmeta.flag+' '+pmeta.name):'—';

  var inCountry=reports.filter(function(r){return r.country===activePaese;});
  var mine=reports.filter(function(r){return r.nomeUtente===user.nome;});
  var openCount=reports.filter(function(r){return (r.stato||'aperta')==='aperta';}).length;

  var listSource=onlyMine?mine.filter(function(r){return r.country===activePaese;}):inCountry;

  function countComments(id){try{return JSON.parse(localStorage.getItem('stray_comments_'+id)||'[]').length;}catch(e){return 0;}}

  var html=
    '<div class="profile-hero"><div class="profile-card">'+
      '<div class="profile-top">'+
        '<div class="profile-avatar">'+avatarEmoji+'</div>'+
        '<div>'+
          '<div class="profile-name">'+esc(user.nome||'Utente')+'</div>'+
          '<div class="profile-email">'+esc(user.email||'')+'</div>'+
          '<div class="profile-badges"><span class="pbadge pbadge-tipo">'+tipoLabel+'</span><span class="pbadge pbadge-paese">'+paeseLabel+'</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="stats-row">'+
        '<div class="stat"><div class="stat-num">'+reports.length+'</div><div class="stat-label">Totali</div></div>'+
        '<div class="stat"><div class="stat-num">'+inCountry.length+'</div><div class="stat-label">Nel paese</div></div>'+
        '<div class="stat"><div class="stat-num">'+mine.length+'</div><div class="stat-label">Le mie</div></div>'+
        '<div class="stat"><div class="stat-num">'+openCount+'</div><div class="stat-label">Aperte</div></div>'+
      '</div>'+
    '</div></div>'+

    '<div class="section">'+
      '<div class="sec-header"><div class="sec-title">Segnalazioni</div>'+
        '<div class="toggle"><button class="'+(!onlyMine?'on':'')+'" onclick="setMine(false)">Tutte</button><button class="'+(onlyMine?'on':'')+'" onclick="setMine(true)">Le mie</button></div>'+
      '</div>'+
      '<div class="filter-row" id="frow">'+
        COUNTRIES.map(function(c){return '<button class="filter-chip'+(activePaese===c.code?' sel':'')+'" onclick="setFilter(\''+c.code+'\')">'+c.flag+' '+c.name+'</button>';}).join('')+
      '</div>';

  if(!listSource.length){
    html+='<div class="empty"><div class="empty-icon">🐾</div><p>Nessuna segnalazione'+(onlyMine?' tua':'')+' in '+CMETA(activePaese).name+'.<br>Puoi <a href="index.html">aggiungerne una</a> dalla home.</p></div>';
  }else{
    listSource.slice().reverse().forEach(function(r){
      var nc=countComments(r.id);
      var stato=r.stato||'aperta';
      var statoLabel={aperta:'Aperta',presa:'In carico',risolta:'Risolta'}[stato];
      var animal={cat:'🐱',dog:'🐶',bird:'🐦',other:'🐾'}[r.type]||'🐾';
      var thumb=r.photo?'<img src="'+r.photo+'" alt="">':animal;
      var m=CMETA(r.country);
      html+=
        '<a class="r-card" href="segnalazione.html?id='+r.id+'">'+
          '<div class="r-thumb">'+thumb+'</div>'+
          '<div class="r-info">'+
            '<div class="r-country">'+m.flag+' '+esc(m.name)+'</div>'+
            '<div class="r-loc">'+esc(r.location||'Posizione non indicata')+'</div>'+
            (r.desc?'<div class="r-desc">'+esc(r.desc.slice(0,60))+'</div>':'')+
            '<div class="r-meta"><span class="tag tag-'+stato+'">'+statoLabel+'</span><span class="r-time">'+ago(r.ts)+'</span>'+(nc>0?'<span class="r-comments">💬 '+nc+'</span>':'')+'</div>'+
          '</div>'+
        '</a>';
    });
  }
  html+='</div>';
  html+='<div class="logout-row"><button class="logout-btn" onclick="logout()">Esci dall\'account</button></div>';
  main.innerHTML=html;
}

function setFilter(code){activePaese=code;render();setTimeout(function(){var chip=document.querySelector('.filter-chip.sel');if(chip)chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},40);}
function setMine(v){onlyMine=v;render();}
function toggleDemo(){document.getElementById('demo').classList.toggle('show');}
function demoLogin(){
  var nome=document.getElementById('dl-nome').value.trim();
  var code=document.getElementById('dl-paese').value;
  if(!nome){toast('Inserisci il tuo nome');return;}
  var m=CMETA(code);
  user={nome:nome,email:nome.toLowerCase().replace(/[^a-z]/g,'')+'@stray.eu',tipo:'privato',paese:{code:m.code,name:m.name},avatar:'cat'};
  localStorage.setItem('stray_user',JSON.stringify(user));
  toast('Bentornato, '+nome.split(' ')[0]+'!');
  activePaese=null;render();
}
function logout(){
  if(!confirm('Vuoi uscire dal tuo account?'))return;
  localStorage.removeItem('stray_user');user=null;
  toast('Uscito dall\'account');
  setTimeout(function(){render();},400);
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ago(ts){var m=Math.floor((Date.now()-ts)/60000);if(m<1)return'Ora';if(m<60)return m+'m fa';var h=Math.floor(m/60);if(h<24)return h+'h fa';return Math.floor(h/24)+'g fa';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

render();
</script>
</body>
</html>
