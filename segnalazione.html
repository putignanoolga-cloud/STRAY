<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stray — Segnalazione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FBF7F0;--surface:#FFFFFF;--surface-2:#F4EEE4;
  --ink:#1E2A28;--ink-soft:#5E6E6A;--ink-faint:#94A09C;
  --line:rgba(30,42,40,0.10);
  --green:#1C9B73;--green-dark:#147257;--green-soft:#E4F3EC;
  --coral:#F2674A;--coral-soft:#FDE7E0;
  --amber:#F2A93B;--blue:#3E7FC1;
  --radius:20px;
  --shadow-sm:0 4px 14px rgba(24,48,40,0.06);
  --shadow:0 14px 38px rgba(24,48,40,0.10);
  --shadow-lg:0 28px 64px rgba(24,48,40,0.16);
}
html,body{background:var(--bg);font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--ink);min-height:100%;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(28,155,115,0.18);}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:13px;padding:13px 18px;background:rgba(251,247,240,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.icon-btn{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .18s;flex-shrink:0;text-decoration:none;}
.icon-btn:hover{border-color:var(--green);color:var(--green);}
.topbar-title{font-family:"Fraunces",serif;font-size:1.2rem;font-weight:600;}

/* photo */
.photo-wrap{width:100%;aspect-ratio:4/3;max-height:62vh;background:var(--surface-2);overflow:hidden;position:relative;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;}
.no-photo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:.3;}
.stato-badge{position:absolute;top:16px;right:16px;padding:7px 15px;border-radius:30px;font-size:.74rem;font-weight:700;letter-spacing:.02em;box-shadow:var(--shadow);backdrop-filter:blur(4px);}
.stato-aperta{background:rgba(242,103,74,.94);color:#fff;}
.stato-presa{background:rgba(242,169,59,.96);color:#3D2A05;}
.stato-risolta{background:rgba(28,155,115,.94);color:#fff;}

/* body */
.body{max-width:600px;margin:0 auto;padding:22px 20px 60px;}
.meta-row{display:flex;align-items:center;gap:9px;font-size:.78rem;color:var(--ink-soft);margin-bottom:14px;flex-wrap:wrap;font-weight:500;}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--ink-faint);}
.seg-title{font-family:"Fraunces",serif;font-size:1.7rem;font-weight:600;line-height:1.15;margin-bottom:12px;letter-spacing:-0.01em;}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.badge{padding:6px 13px;border-radius:30px;font-size:.76rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
.b-vet{background:var(--coral-soft);color:#C8442A;}
.b-food{background:#FDF1D6;color:#B57A12;}
.b-rescue{background:#E2EDF8;color:#2C5E94;}
.b-shelter{background:var(--green-soft);color:var(--green-dark);}
.seg-desc{font-size:.98rem;line-height:1.7;color:var(--ink-soft);margin-bottom:22px;}

/* info cards */
.info-card{display:flex;align-items:flex-start;gap:13px;padding:15px 16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.info-card .ic-ico{width:38px;height:38px;border-radius:11px;background:var(--green-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic-label{font-size:.7rem;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.ic-val{font-size:.95rem;font-weight:500;}
.loc-blur{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.loc-blur .blurtxt{font-style:italic;color:var(--ink-faint);}
.lock-hint{font-size:.78rem;font-weight:700;color:var(--green);background:var(--green-soft);border-radius:20px;padding:6px 13px;text-decoration:none;flex-shrink:0;}
.by-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}

/* mi occupo io */
.occupo-btn{width:100%;padding:16px;background:var(--green);border:none;border-radius:16px;color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s,transform .12s;margin:8px 0 26px;box-shadow:var(--shadow-sm);}
.occupo-btn:hover{background:var(--green-dark);}
.occupo-btn:active{transform:scale(.99);}
.occupo-btn.taken{background:var(--green-soft);color:var(--green-dark);cursor:default;box-shadow:none;}
.occupo-lock{width:100%;padding:15px;background:var(--surface);border:1.5px dashed var(--line);border-radius:16px;color:var(--ink-soft);font-size:.92rem;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin:8px 0 26px;text-decoration:none;transition:border-color .2s;}
.occupo-lock:hover{border-color:var(--green);color:var(--green-dark);}

/* discussion */
.sec-label{font-family:"Fraunces",serif;font-size:1.3rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.sec-label .count{font-family:"Plus Jakarta Sans";font-size:.78rem;font-weight:700;background:var(--green-soft);color:var(--green-dark);border-radius:20px;padding:3px 11px;}

.commento{display:flex;gap:11px;margin-bottom:18px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.c-avatar{width:38px;height:38px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.c-avatar.org{background:var(--green-soft);}
.c-body{flex:1;min-width:0;}
.c-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.c-name{font-size:.88rem;font-weight:700;}
.c-badge-org{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--green-soft);color:var(--green-dark);border-radius:7px;padding:2px 7px;}
.c-badge-occ{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:#FDF1D6;color:#B57A12;border-radius:7px;padding:2px 7px;}
.c-time{font-size:.74rem;color:var(--ink-faint);}
.c-text{font-size:.92rem;line-height:1.55;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:4px 16px 16px 16px;padding:12px 15px;box-shadow:var(--shadow-sm);}
.c-actions{display:flex;gap:14px;margin-top:7px;}
.c-reply-btn{font-size:.78rem;font-weight:600;color:var(--ink-soft);background:none;border:none;cursor:pointer;padding:0;transition:color .15s;}
.c-reply-btn:hover{color:var(--green);}
.replies{margin-left:26px;margin-top:12px;border-left:2px solid var(--line);padding-left:16px;}

/* write box */
.write-box{display:flex;gap:11px;margin-bottom:14px;align-items:flex-end;}
.write-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.write-input-wrap{flex:1;}
.write-input{width:100%;padding:12px 16px;background:var(--surface);border:1.5px solid var(--line);border-radius:22px;color:var(--ink);font-size:1rem;font-family:inherit;outline:none;resize:none;max-height:130px;transition:border-color .2s;}
.write-input::placeholder{color:var(--ink-faint);}
.write-input:focus{border-color:var(--green);}
.send-btn{width:42px;height:42px;flex-shrink:0;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .12s;}
.send-btn:hover{background:var(--green-dark);}
.send-btn:active{transform:scale(.92);}

.login-prompt{padding:18px;background:var(--green-soft);border-radius:16px;text-align:center;margin-bottom:10px;}
.login-prompt p{font-size:.9rem;color:var(--green-dark);margin-bottom:14px;font-weight:500;}
.login-prompt a{display:inline-block;padding:11px 22px;background:var(--green);color:#fff;border-radius:30px;font-size:.86rem;font-weight:700;text-decoration:none;margin:0 4px;transition:background .2s;}
.login-prompt a:hover{background:var(--green-dark);}
.login-prompt a.ghost{background:var(--surface);color:var(--green-dark);}

.reply-form{display:none;gap:8px;margin-top:10px;align-items:flex-end;}
.reply-form.open{display:flex;}
.reply-input{flex:1;padding:9px 14px;background:var(--surface);border:1.5px solid var(--line);border-radius:18px;color:var(--ink);font-size:.92rem;font-family:inherit;outline:none;transition:border-color .2s;}
.reply-input:focus{border-color:var(--green);}
.reply-send{width:34px;height:34px;flex-shrink:0;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.empty-comments{text-align:center;padding:30px 0 14px;color:var(--ink-faint);font-size:.9rem;line-height:1.6;}
.empty-comments .ec-ico{font-size:2rem;margin-bottom:8px;}

.not-found{text-align:center;padding:70px 24px;color:var(--ink-soft);}
.not-found .nf-ico{font-size:3rem;margin-bottom:16px;}
.not-found a{color:var(--green);font-weight:700;text-decoration:none;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;padding:13px 24px;border-radius:30px;font-size:.88rem;font-weight:600;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s !important;}}
</style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn" onclick="goBack()" aria-label="Indietro">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">Segnalazione</div>
</div>

<div class="photo-wrap" id="photo-wrap">
  <div class="no-photo" id="no-photo">🐾</div>
  <div class="stato-badge stato-aperta" id="stato-badge">Aperta</div>
</div>

<div class="body" id="body-root">
  <div class="meta-row">
    <span id="meta-paese"></span><div class="meta-dot"></div>
    <span id="meta-animale"></span><div class="meta-dot"></div>
    <span id="meta-time"></span>
  </div>

  <div class="seg-title" id="seg-title">Animale trovato</div>
  <div class="badges" id="badges"></div>
  <p class="seg-desc" id="seg-desc"></p>

  <!-- location -->
  <div class="info-card">
    <div class="ic-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div style="flex:1"><div class="ic-label">Posizione</div><div id="loc-val"></div></div>
  </div>

  <!-- by -->
  <div class="info-card">
    <div class="by-avatar" id="by-avatar">👤</div>
    <div><div class="ic-label">Segnalato da</div><div class="ic-val" id="by-name">Utente anonimo</div><div class="c-time" id="by-time"></div></div>
  </div>

  <div id="occupo-wrap"></div>

  <div class="sec-label">Discussione <span class="count" id="n-comments">0</span></div>
  <div id="write-area"></div>
  <div id="comments-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var params=new URLSearchParams(window.location.search);
var segId=params.get('id');
var reports=JSON.parse(localStorage.getItem('stray_r')||'[]');
var seg=reports.find(function(r){return r.id===segId;});
var user=null;try{user=JSON.parse(localStorage.getItem('stray_user')||'null');}catch(e){}
var CKEY='stray_comments_'+segId;
var comments=JSON.parse(localStorage.getItem(CKEY)||'[]');

var FLAGS={IT:'🇮🇹',FR:'🇫🇷',DE:'🇩🇪',ES:'🇪🇸',PT:'🇵🇹',NL:'🇳🇱',BE:'🇧🇪',PL:'🇵🇱',GR:'🇬🇷',HR:'🇭🇷',AT:'🇦🇹',CH:'🇨🇭'};
var AVATARS={cat:'🐱',dog:'🐶',bird:'🐦',fox:'🦊',sun:'🌻'};

function goBack(){if(history.length>1)history.back();else window.location.href='index.html';}

if(!seg){
  document.getElementById('body-root').innerHTML='<div class="not-found"><div class="nf-ico">🔍</div><p>Segnalazione non trovata.</p><p style="margin-top:12px"><a href="index.html">Torna alla home</a></p></div>';
  document.getElementById('photo-wrap').style.display='none';
}else{
  // photo
  if(seg.photo){var img=document.createElement('img');img.src=seg.photo;document.getElementById('photo-wrap').insertBefore(img,document.getElementById('no-photo'));document.getElementById('no-photo').style.display='none';}
  else{document.getElementById('no-photo').textContent={cat:'🐱',dog:'🐶',bird:'🐦',other:'🐾'}[seg.type]||'🐾';}
  // stato
  var statoEl=document.getElementById('stato-badge');var stato=seg.stato||'aperta';
  statoEl.textContent=stato==='aperta'?'Aperta':stato==='presa'?'Presa in carico':'Risolta';
  statoEl.className='stato-badge stato-'+stato;
  // meta
  var fl=FLAGS[seg.country]||'🌍';
  document.getElementById('meta-paese').textContent=fl+' '+(seg.countryName||seg.paese||seg.country||'');
  var animaleLabel={cat:'Gatto',dog:'Cane',bird:'Uccello',other:'Animale'}[seg.type]||'Animale';
  document.getElementById('meta-animale').textContent=animaleLabel;
  document.getElementById('meta-time').textContent=ago(seg.ts);
  document.getElementById('seg-title').textContent=animaleLabel+' a '+(seg.location||'posizione sconosciuta').split(',')[0];
  // badges
  var badgeMap={vet:['b-vet','🩺 Cure vet.'],food:['b-food','🍖 Cibo'],rescue:['b-rescue','🚑 Salvataggio'],shelter:['b-shelter','🏠 Riparo']};
  var badgesEl=document.getElementById('badges');
  (seg.needs||[]).forEach(function(n){if(!badgeMap[n])return;var s=document.createElement('span');s.className='badge '+badgeMap[n][0];s.textContent=badgeMap[n][1];badgesEl.appendChild(s);});
  // desc
  document.getElementById('seg-desc').textContent=seg.desc||'Nessuna descrizione aggiuntiva.';
  // location gating
  var locEl=document.getElementById('loc-val');
  if(user){locEl.className='ic-val';locEl.textContent=seg.location||'Posizione non specificata';}
  else{locEl.innerHTML='<div class="loc-blur"><span class="blurtxt">Visibile solo agli utenti registrati</span><a class="lock-hint" href="registrati.html">🔓 Registrati</a></div>';}
  // by
  document.getElementById('by-name').textContent=seg.nomeUtente||'Utente anonimo';
  document.getElementById('by-time').textContent='Segnalato '+ago(seg.ts);
  // mi occupo io
  var occupoWrap=document.getElementById('occupo-wrap');
  var preso=comments.some(function(c){return c.tipo==='mi_occupo';});
  if(user){
    if(preso){occupoWrap.innerHTML='<button class="occupo-btn taken" disabled>✓ Qualcuno se ne sta occupando</button>';}
    else{occupoWrap.innerHTML='<button class="occupo-btn" onclick="miOccupo()">🤝 Mi occupo io</button>';}
  }else{
    occupoWrap.innerHTML='<a class="occupo-lock" href="registrati.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Accedi per intervenire o commentare</a>';
  }
  renderAll();
}

function miOccupo(){
  if(!user){toast('Accedi per intervenire');return;}
  comments.push({id:Date.now()+'',ts:Date.now(),user:user.nome||'Volontario',tipo:'mi_occupo',testo:'Vado io a recuperare questo animale. 🐾',tipo_account:user.tipo||'privato',replies:[]});
  saveComments();
  reports=reports.map(function(r){if(r.id===segId){r.stato='presa';}return r;});
  localStorage.setItem('stray_r',JSON.stringify(reports));
  var sb=document.getElementById('stato-badge');sb.textContent='Presa in carico';sb.className='stato-badge stato-presa';
  toast('Hai preso in carico questa segnalazione 💚');
  document.getElementById('occupo-wrap').innerHTML='<button class="occupo-btn taken" disabled>✓ Te ne stai occupando tu</button>';
  renderAll();
}

function renderAll(){renderWriteBox();renderComments();}

function renderWriteBox(){
  var wa=document.getElementById('write-area');
  if(!user){wa.innerHTML='<div class="login-prompt"><p>Accedi per commentare e coordinarti con gli altri volontari.</p><a href="registrati.html">Registrati</a><a href="account.html" class="ghost">Accedi</a></div>';return;}
  var av=AVATARS[user.avatar]||'👤';
  wa.innerHTML='<div class="write-box"><div class="write-avatar">'+av+'</div><div class="write-input-wrap"><textarea class="write-input" id="main-input" placeholder="Scrivi un commento…" rows="1" oninput="autoResize(this)"></textarea></div>'+
    '<button class="send-btn" onclick="sendComment()" aria-label="Invia"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>';
}

function renderComments(){
  var list=document.getElementById('comments-list');
  document.getElementById('n-comments').textContent=comments.length;
  if(!comments.length){list.innerHTML='<div class="empty-comments"><div class="ec-ico">💬</div>Nessun commento ancora.<br>Sii il primo a intervenire.</div>';return;}
  list.innerHTML='';
  comments.forEach(function(c,idx){list.appendChild(buildComment(c,idx,false));});
}

function buildComment(c,idx,isReply){
  var wrap=document.createElement('div');wrap.className='commento';
  var isOrg=c.tipo_account==='associazione';
  var avatarChar=isOrg?'🏠':'👤';
  var orgBadge=isOrg?'<span class="c-badge-org">Associazione</span>':'';
  var occBadge=c.tipo==='mi_occupo'?'<span class="c-badge-occ">🤝 Mi occupo io</span>':'';
  var replyBtn=(!isReply&&user)?'<button class="c-reply-btn" onclick="toggleReply(\'rf-'+idx+'\')">↩ Rispondi</button>':'';
  var replyForm=(!isReply&&user)?'<div class="reply-form" id="rf-'+idx+'"><input class="reply-input" id="ri-'+idx+'" placeholder="Scrivi una risposta…"><button class="reply-send" onclick="sendReply('+idx+')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>':'';
  wrap.innerHTML='<div class="c-avatar'+(isOrg?' org':'')+'">'+avatarChar+'</div><div class="c-body"><div class="c-header"><span class="c-name">'+esc(c.user)+'</span>'+orgBadge+occBadge+'<span class="c-time">'+ago(c.ts)+'</span></div><div class="c-text">'+esc(c.testo)+'</div><div class="c-actions">'+replyBtn+'</div>'+replyForm+'</div>';
  if(!isReply&&c.replies&&c.replies.length){
    var rwrap=document.createElement('div');rwrap.className='replies';
    c.replies.forEach(function(r,ri){rwrap.appendChild(buildComment(r,idx+'-'+ri,true));});
    wrap.querySelector('.c-body').appendChild(rwrap);
  }
  return wrap;
}

function sendComment(){
  if(!user)return;
  var inp=document.getElementById('main-input');var txt=inp?inp.value.trim():'';
  if(!txt){toast('Scrivi qualcosa prima di inviare');return;}
  comments.push({id:Date.now()+'',ts:Date.now(),user:user.nome||'Volontario',tipo:'messaggio',testo:txt,tipo_account:user.tipo||'privato',replies:[]});
  saveComments();if(inp)inp.value='';renderAll();toast('Commento inviato');
}
function sendReply(idx){
  if(!user)return;
  var inp=document.getElementById('ri-'+idx);var txt=inp?inp.value.trim():'';
  if(!txt)return;
  if(!comments[idx].replies)comments[idx].replies=[];
  comments[idx].replies.push({id:Date.now()+'',ts:Date.now(),user:user.nome||'Volontario',tipo:'messaggio',testo:txt,tipo_account:user.tipo||'privato'});
  saveComments();renderAll();toast('Risposta inviata');
}
function toggleReply(id){var rf=document.getElementById(id);if(!rf)return;rf.classList.toggle('open');if(rf.classList.contains('open')){var inp=rf.querySelector('.reply-input');if(inp)inp.focus();}}

function saveComments(){localStorage.setItem(CKEY,JSON.stringify(comments));}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ago(ts){var m=Math.floor((Date.now()-ts)/60000);if(m<1)return'Ora';if(m<60)return m+'m fa';var h=Math.floor(m/60);if(h<24)return h+'h fa';return Math.floor(h/24)+'g fa';}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){var a=document.activeElement;if(a&&a.id==='main-input'){e.preventDefault();sendComment();}else if(a&&a.id&&a.id.indexOf('ri-')===0){e.preventDefault();sendReply(a.id.slice(3));}}});
</script>
