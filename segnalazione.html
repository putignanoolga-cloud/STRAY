<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stray — Segnalazione</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--amber:#e8a44a;--amber-dim:#c47a1a;--bg:#05060a;--border:rgba(255,255,255,0.09);--muted:rgba(255,255,255,0.38);--card:rgba(255,255,255,0.035);}
html,body{background:#05060a !important;font-family:"Inter",sans-serif;color:#fff;min-height:100%;-webkit-font-smoothing:antialiased;}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:12px;
  padding:16px 20px 14px;
  background:#05060a;
  border-bottom:1px solid var(--border);
}
.back-btn{
  width:36px;height:36px;
  border:1px solid rgba(255,255,255,0.12);
  background:none;border-radius:50%;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  flex-shrink:0;transition:border-color .2s;
}
.back-btn:hover{border-color:var(--amber);}
.topbar-title{
  font-family:"Cormorant Garamond",serif;
  font-size:1.1rem;font-weight:300;font-style:italic;
  color:rgba(255,255,255,0.8);
}

/* ── PHOTO ── */
.photo-wrap{
  width:100%;aspect-ratio:4/3;
  background:#0d0e14;
  overflow:hidden;position:relative;
}
.photo-wrap img{width:100%;height:100%;object-fit:cover;}
.no-photo{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;opacity:.2;
}
/* stato badge on photo */
.stato-badge{
  position:absolute;top:14px;right:14px;
  padding:5px 12px;border-radius:20px;
  font-size:.7rem;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;
}
.stato-aperta{background:rgba(184,64,64,0.85);color:#fff;}
.stato-presa{background:rgba(232,164,74,0.9);color:#05060a;}
.stato-risolta{background:rgba(74,174,106,0.85);color:#fff;}

/* ── BODY ── */
.body{padding:20px;max-width:600px;margin:0 auto;}

/* meta row */
.meta-row{
  display:flex;align-items:center;gap:8px;
  font-size:.72rem;color:var(--muted);
  margin-bottom:14px;flex-wrap:wrap;
}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);}

/* title */
.seg-title{
  font-family:"Cormorant Garamond",serif;
  font-size:1.5rem;font-weight:300;
  color:#fff;margin-bottom:8px;line-height:1.2;
}

/* badges */
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.badge{
  padding:4px 10px;border-radius:10px;
  font-size:.7rem;font-weight:500;
}
.b-vet{background:rgba(184,64,64,0.15);color:#e05555;border:1px solid rgba(184,64,64,0.25);}
.b-food{background:rgba(232,164,74,0.12);color:var(--amber);border:1px solid rgba(232,164,74,0.25);}
.b-rescue{background:rgba(100,120,220,0.12);color:#8899ff;border:1px solid rgba(100,120,220,0.25);}
.b-shelter{background:rgba(74,174,106,0.12);color:#4aae6a;border:1px solid rgba(74,174,106,0.25);}

/* description */
.seg-desc{
  font-size:.88rem;line-height:1.65;
  color:rgba(255,255,255,0.65);
  margin-bottom:20px;
}

/* location */
.location-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:20px;
}
.location-row svg{flex-shrink:0;margin-top:2px;}
.loc-label{font-size:.67rem;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.loc-val{font-size:.88rem;color:#fff;}
.loc-blur{
  font-size:.88rem;color:var(--muted);
  font-style:italic;
  display:flex;align-items:center;gap:7px;
}
.lock-hint{
  font-size:.72rem;color:var(--amber);
  background:rgba(232,164,74,0.08);
  border:1px solid rgba(232,164,74,0.2);
  border-radius:8px;padding:3px 8px;
  cursor:pointer;flex-shrink:0;
  text-decoration:none;
}

/* segnalato da */
.by-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:24px;
}
.by-avatar{
  width:36px;height:36px;border-radius:50%;
  background:rgba(232,164,74,0.12);
  border:1px solid rgba(232,164,74,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.by-name{font-size:.85rem;font-weight:500;}
.by-time{font-size:.72rem;color:var(--muted);}

/* ── MI OCCUPO IO ── */
.occupo-btn{
  width:100%;padding:14px;
  background:rgba(74,174,106,0.12);
  border:1.5px solid rgba(74,174,106,0.35);
  border-radius:14px;
  color:#4aae6a;
  font-size:.92rem;font-weight:600;
  font-family:"Inter",sans-serif;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .2s,border-color .2s;
  margin-bottom:24px;
}
.occupo-btn:hover{background:rgba(74,174,106,0.2);}
.occupo-btn.taken{
  background:rgba(74,174,106,0.2);
  border-color:rgba(74,174,106,0.5);
  color:#6acc84;cursor:default;
}
.occupo-lock{
  width:100%;padding:13px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:14px;color:var(--muted);
  font-size:.85rem;font-family:"Inter",sans-serif;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;
  margin-bottom:24px;
  text-decoration:none;
}

/* ── SEZIONE COMMENTI ── */
.sec-label{
  font-size:.62rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--amber);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.sec-label span{
  background:rgba(232,164,74,0.12);
  border:1px solid rgba(232,164,74,0.2);
  border-radius:10px;padding:2px 8px;
  font-size:.68rem;
}

/* commento card */
.commento{
  display:flex;gap:10px;
  margin-bottom:16px;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.c-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;flex-shrink:0;margin-top:2px;
}
.c-avatar.org{background:rgba(232,164,74,0.15);}
.c-body{flex:1;min-width:0;}
.c-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:5px;flex-wrap:wrap;
}
.c-name{font-size:.8rem;font-weight:600;color:rgba(255,255,255,.85);}
.c-badge-org{
  font-size:.6rem;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;
  background:rgba(232,164,74,0.12);color:var(--amber);
  border:1px solid rgba(232,164,74,0.2);
  border-radius:6px;padding:1px 6px;
}
.c-badge-occ{
  font-size:.6rem;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;
  background:rgba(74,174,106,0.12);color:#4aae6a;
  border:1px solid rgba(74,174,106,0.25);
  border-radius:6px;padding:1px 6px;
}
.c-time{font-size:.7rem;color:var(--muted);}
.c-text{
  font-size:.84rem;line-height:1.55;
  color:rgba(255,255,255,.7);
  background:#0d0e14;
  border:1px solid var(--border);
  border-radius:0 12px 12px 12px;
  padding:10px 13px;
}
.c-actions{
  display:flex;gap:12px;margin-top:6px;
}
.c-reply-btn{
  font-size:.72rem;color:var(--muted);
  background:none;border:none;cursor:pointer;
  padding:0;transition:color .15s;
}
.c-reply-btn:hover{color:var(--amber);}

/* reply indent */
.replies{
  margin-left:42px;
  margin-top:8px;
  border-left:1px solid rgba(255,255,255,0.06);
  padding-left:14px;
}

/* ── SCRIVI COMMENTO ── */
.write-box{
  display:flex;gap:10px;
  margin-bottom:12px;align-items:flex-end;
}
.write-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(232,164,74,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;flex-shrink:0;
}
.write-input-wrap{flex:1;}
.write-input{
  width:100%;
  padding:10px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:20px;
  color:#fff;font-size:.88rem;
  font-family:"Inter",sans-serif;
  outline:none;-webkit-appearance:none;
  transition:border-color .2s;resize:none;
  max-height:120px;
}
.write-input::placeholder{color:rgba(255,255,255,.22);}
.write-input:focus{border-color:var(--amber);}
.send-btn{
  width:36px;height:36px;flex-shrink:0;
  background:var(--amber);border:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
}
.send-btn:hover{background:var(--amber-dim);}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* login prompt */
.login-prompt{
  padding:14px;
  background:rgba(232,164,74,0.06);
  border:1px solid rgba(232,164,74,0.15);
  border-radius:14px;
  text-align:center;
  margin-bottom:8px;
}
.login-prompt p{font-size:.82rem;color:var(--muted);margin-bottom:10px;}
.login-prompt a{
  display:inline-block;padding:8px 20px;
  background:var(--amber);color:#05060a;
  border-radius:20px;font-size:.8rem;font-weight:600;
  text-decoration:none;margin:0 4px;
  transition:background .2s;
}
.login-prompt a.ghost{
  background:transparent;color:var(--amber);
  border:1px solid rgba(232,164,74,0.35);
}

/* reply form */
.reply-form{
  display:flex;gap:8px;margin-top:8px;
  align-items:flex-end;
  display:none;
}
.reply-form.open{display:flex;}
.reply-input{
  flex:1;padding:8px 12px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:16px;color:#fff;
  font-size:.82rem;font-family:"Inter",sans-serif;
  outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
.reply-input::placeholder{color:rgba(255,255,255,.2);}
.reply-input:focus{border-color:var(--amber);}
.reply-send{
  width:30px;height:30px;flex-shrink:0;
  background:var(--amber);border:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* empty state */
.empty-comments{
  text-align:center;padding:28px 0 12px;
  color:var(--muted);font-size:.83rem;
}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(232,164,74,.96);color:#05060a;padding:9px 22px;border-radius:30px;font-size:.83rem;font-weight:600;opacity:0;transition:all .28s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

body{background:#05060a !important;}
</style>
</head>
<body style="background:#05060a !important;">

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">Segnalazione</div>
</div>

<!-- PHOTO -->
<div class="photo-wrap" id="photo-wrap">
  <div class="no-photo" id="no-photo">&#128049;</div>
  <div class="stato-badge stato-aperta" id="stato-badge">Aperta</div>
</div>

<!-- BODY -->
<div class="body">

  <!-- meta -->
  <div class="meta-row">
    <span id="meta-paese"></span>
    <div class="meta-dot"></div>
    <span id="meta-animale"></span>
    <div class="meta-dot"></div>
    <span id="meta-time"></span>
  </div>

  <div class="seg-title" id="seg-title">Animale trovato</div>
  <div class="badges" id="badges"></div>
  <p class="seg-desc" id="seg-desc"></p>

  <!-- location -->
  <div class="location-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <div>
      <div class="loc-label">Posizione</div>
      <div id="loc-val"></div>
    </div>
  </div>

  <!-- segnalato da -->
  <div class="by-row" id="by-row">
    <div class="by-avatar" id="by-avatar">&#128100;</div>
    <div>
      <div class="by-name" id="by-name">Utente anonimo</div>
      <div class="by-time" id="by-time"></div>
    </div>
  </div>

  <!-- MI OCCUPO IO -->
  <div id="occupo-wrap"></div>

  <!-- COMMENTI -->
  <div class="sec-label">
    Discussione <span id="n-comments">0</span>
  </div>

  <div id="write-area"></div>
  <div id="comments-list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── LOAD SEGNALAZIONE ─────────────────────────────────
var params = new URLSearchParams(window.location.search);
var segId  = params.get('id');
var reports = JSON.parse(localStorage.getItem('stray_r') || '[]');
var seg = reports.find(function(r){ return r.id === segId; });

// load current user
var user = null;
try { user = JSON.parse(localStorage.getItem('stray_user') || 'null'); } catch(e){}

// load comments for this segnalazione
var CKEY = 'stray_comments_' + segId;
var comments = JSON.parse(localStorage.getItem(CKEY) || '[]');

// ── RENDER SEGNALAZIONE ───────────────────────────────
if (!seg) {
  document.querySelector('.body').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px 0">Segnalazione non trovata.</p>';
} else {
  // photo
  if (seg.photo) {
    var img = document.createElement('img');
    img.src = seg.photo;
    document.getElementById('photo-wrap').insertBefore(img, document.getElementById('no-photo'));
    document.getElementById('no-photo').style.display = 'none';
  }

  // stato
  var statoEl = document.getElementById('stato-badge');
  var stato = seg.stato || 'aperta';
  statoEl.textContent = stato === 'aperta' ? 'Aperta' : stato === 'presa' ? 'Presa in carico' : 'Risolta';
  statoEl.className = 'stato-badge stato-' + (stato === 'presa' ? 'presa' : stato);

  // meta
  document.getElementById('meta-paese').textContent = seg.country || seg.paese || '';
  var animaleLabel = {cat:'Gatto',dog:'Cane',bird:'Uccello',other:'Animale'}[seg.type] || 'Animale';
  document.getElementById('meta-animale').textContent = animaleLabel;
  document.getElementById('meta-time').textContent = ago(seg.ts);

  // title
  document.getElementById('seg-title').textContent = animaleLabel + ' trovato a ' + (seg.location || 'posizione sconosciuta').split(',')[0];

  // badges
  var badgeMap = {vet:['b-vet','Cure vet'],food:['b-food','Cibo'],rescue:['b-rescue','Salvataggio'],shelter:['b-shelter','Riparo']};
  var badgesEl = document.getElementById('badges');
  (seg.needs || []).forEach(function(n){
    if (!badgeMap[n]) return;
    var s = document.createElement('span');
    s.className = 'badge ' + badgeMap[n][0];
    s.textContent = badgeMap[n][1];
    badgesEl.appendChild(s);
  });

  // desc
  var descEl = document.getElementById('seg-desc');
  descEl.textContent = seg.desc || 'Nessuna descrizione aggiuntiva.';

  // location — blur if not logged in
  var locEl = document.getElementById('loc-val');
  if (user) {
    locEl.className = 'loc-val';
    locEl.textContent = seg.location || 'Posizione non specificata';
  } else {
    locEl.innerHTML = '<span class="loc-blur">Visibile solo agli utenti registrati <a class="lock-hint" href="registrati.html">Registrati</a></span>';
  }

  // by row
  document.getElementById('by-name').textContent = seg.nomeUtente || 'Utente anonimo';
  document.getElementById('by-time').textContent = 'Segnalato ' + ago(seg.ts);

  // MI OCCUPO IO
  var occupoWrap = document.getElementById('occupo-wrap');
  var preso = comments.some(function(c){ return c.tipo === 'mi_occupo'; });
  if (user) {
    if (preso) {
      occupoWrap.innerHTML = '<button class="occupo-btn taken" disabled>&#10003; Qualcuno se ne sta occupando</button>';
    } else {
      occupoWrap.innerHTML = '<button class="occupo-btn" onclick="miOccupo()">&#129306; Mi occupo io</button>';
    }
  } else {
    occupoWrap.innerHTML = '<a class="occupo-lock" href="registrati.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Accedi per intervenire o commentare</a>';
  }

  // render comments + write box
  renderAll();
}

// ── MI OCCUPO IO ──────────────────────────────────────
function miOccupo() {
  if (!user) { toast('Accedi per intervenire'); return; }
  var c = {
    id: Date.now() + '',
    ts: Date.now(),
    user: user.nome || 'Volontario',
    tipo: 'mi_occupo',
    testo: 'Vado io a recuperare questo animale.',
    paese: user.paese ? user.paese.name : '',
    tipo_account: user.tipo || 'privato',
    replies: []
  };
  comments.push(c);
  saveComments();
  // update stato segnalazione
  var reports2 = JSON.parse(localStorage.getItem('stray_r') || '[]');
  reports2 = reports2.map(function(r){ if(r.id===segId){r.stato='presa';}return r; });
  localStorage.setItem('stray_r', JSON.stringify(reports2));
  toast('Hai preso in carico questa segnalazione');
  document.getElementById('occupo-wrap').innerHTML = '<button class="occupo-btn taken" disabled>&#10003; Te ne stai occupando tu</button>';
  renderAll();
}

// ── RENDER ALL ────────────────────────────────────────
function renderAll() {
  renderWriteBox();
  renderComments();
}

function renderWriteBox() {
  var wa = document.getElementById('write-area');
  if (!user) {
    wa.innerHTML = '<div class="login-prompt"><p>Accedi per commentare e coordinarti con gli altri volontari.</p><a href="registrati.html">Registrati</a><a href="#" class="ghost">Accedi</a></div>';
    return;
  }
  wa.innerHTML =
    '<div class="write-box">' +
      '<div class="write-avatar">' + (user.avatar || '&#128100;') + '</div>' +
      '<div class="write-input-wrap">' +
        '<textarea class="write-input" id="main-input" placeholder="Scrivi un commento..." rows="1" oninput="autoResize(this)"></textarea>' +
      '</div>' +
      '<button class="send-btn" onclick="sendComment()" title="Invia">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#05060a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
      '</button>' +
    '</div>';
}

function renderComments() {
  var list = document.getElementById('comments-list');
  var n = comments.length;
  document.getElementById('n-comments').textContent = n;

  if (!n) {
    list.innerHTML = '<div class="empty-comments">Nessun commento ancora.<br>Sii il primo a intervenire.</div>';
    return;
  }

  list.innerHTML = '';
  comments.forEach(function(c, idx) {
    list.appendChild(buildComment(c, idx, false));
  });
}

function buildComment(c, idx, isReply) {
  var wrap = document.createElement('div');
  wrap.className = 'commento';

  var avatarChar = c.tipo_account === 'associazione' ? '&#127968;' : '&#128100;';
  var orgBadge = c.tipo_account === 'associazione' ? '<span class="c-badge-org">Associazione</span>' : '';
  var occBadge = c.tipo === 'mi_occupo' ? '<span class="c-badge-occ">&#129306; Mi occupo io</span>' : '';

  var repliesHTML = '';
  if (!isReply && c.replies && c.replies.length > 0) {
    var repliesWrap = '<div class="replies">';
    c.replies.forEach(function(r, ri) {
      repliesWrap += buildComment(r, idx + '-' + ri, true).outerHTML;
    });
    repliesWrap += '</div>';
    repliesHTML = repliesWrap;
  }

  var replyBtn = !isReply && user ?
    '<button class="c-reply-btn" onclick="toggleReply(\'rf-'+idx+'\')">Rispondi</button>' : '';

  var replyForm = !isReply && user ?
    '<div class="reply-form" id="rf-' + idx + '">' +
      '<textarea class="reply-input" id="ri-'+idx+'" placeholder="Scrivi una risposta..." rows="1" oninput="autoResize(this)"></textarea>' +
      '<button class="reply-send" onclick="sendReply('+idx+')">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#05060a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
      '</button>' +
    '</div>' : '';

  wrap.innerHTML =
    '<div class="c-avatar' + (c.tipo_account==='associazione'?' org':'') + '">' + avatarChar + '</div>' +
    '<div class="c-body">' +
      '<div class="c-header">' +
        '<span class="c-name">' + esc(c.user) + '</span>' +
        orgBadge + occBadge +
        '<span class="c-time">' + ago(c.ts) + '</span>' +
      '</div>' +
      '<div class="c-text">' + esc(c.testo) + '</div>' +
      '<div class="c-actions">' + replyBtn + '</div>' +
      replyForm +
    '</div>';

  if (repliesHTML) {
    var rDiv = document.createElement('div');
    rDiv.innerHTML = repliesHTML;
    wrap.appendChild(rDiv.firstChild);
  }

  return wrap;
}

// ── SEND COMMENT ──────────────────────────────────────
function sendComment() {
  if (!user) return;
  var inp = document.getElementById('main-input');
  var txt = inp ? inp.value.trim() : '';
  if (!txt) { toast('Scrivi qualcosa prima di inviare'); return; }
  var c = {
    id: Date.now() + '',
    ts: Date.now(),
    user: user.nome || 'Volontario',
    tipo: 'messaggio',
    testo: txt,
    tipo_account: user.tipo || 'privato',
    replies: []
  };
  comments.push(c);
  saveComments();
  if (inp) inp.value = '';
  renderAll();
  toast('Commento inviato');
}

// ── SEND REPLY ────────────────────────────────────────
function sendReply(idx) {
  if (!user) return;
  var inp = document.getElementById('ri-' + idx);
  var txt = inp ? inp.value.trim() : '';
  if (!txt) return;
  if (!comments[idx].replies) comments[idx].replies = [];
  comments[idx].replies.push({
    id: Date.now() + '',
    ts: Date.now(),
    user: user.nome || 'Volontario',
    tipo: 'messaggio',
    testo: txt,
    tipo_account: user.tipo || 'privato'
  });
  saveComments();
  renderAll();
  toast('Risposta inviata');
}

function toggleReply(id) {
  var rf = document.getElementById(id);
  if (!rf) return;
  rf.classList.toggle('open');
  if (rf.classList.contains('open')) {
    var inp = rf.querySelector('.reply-input');
    if (inp) inp.focus();
  }
}

// ── UTILS ─────────────────────────────────────────────
function saveComments() { localStorage.setItem(CKEY, JSON.stringify(comments)); }
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function ago(ts){
  var m=Math.floor((Date.now()-ts)/60000);
  if(m<1)return'Ora';if(m<60)return m+'m fa';
  var h=Math.floor(m/60);if(h<24)return h+'h fa';
  return Math.floor(h/24)+'g fa';
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// enter to send
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    var active = document.activeElement;
    if (active && active.id === 'main-input') { e.preventDefault(); sendComment(); }
  }
});
</script>
